<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, sans-serif); color: var(--color-text-primary); background: transparent; font-size: 14px; }

.app { display: flex; flex-direction: column; gap: 0; min-height: 600px; }
.tabs { display: flex; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
.tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--color-text-secondary); border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: var(--color-text-primary); }
.tab.active { color: var(--color-text-primary); border-bottom-color: var(--color-text-primary); font-weight: 500; }

.panel { display: none; padding: 16px; }
.panel.active { display: block; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }
input, select, textarea { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 7px 10px; font-size: 13px; color: var(--color-text-primary); font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--color-border-primary); }
textarea { resize: vertical; min-height: 60px; }

.rarity-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.rarity-btn { padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); cursor: pointer; font-size: 12px; font-weight: 500; background: var(--color-background-primary); color: var(--color-text-secondary); transition: all 0.15s; }
.rarity-btn.active { border-color: transparent; }
.rarity-btn[data-r="commun"].active { background: #B4B2A9; color: #2C2C2A; }
.rarity-btn[data-r="peu commun"].active { background: #9FE1CB; color: #085041; }
.rarity-btn[data-r="rare"].active { background: #B5D4F4; color: #0C447C; }
.rarity-btn[data-r="épique"].active { background: #CECBF6; color: #3C3489; }
.rarity-btn[data-r="légendaire"].active { background: #FAC775; color: #633806; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.stat-row { display: flex; align-items: center; gap: 6px; }
.stat-row input[type=text] { width: 90px; font-size: 12px; }
.stat-row input[type=number] { width: 70px; font-size: 12px; }
.stat-row .rm { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 2px 6px; font-size: 16px; line-height: 1; }
.add-btn { padding: 5px 10px; border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); background: none; cursor: pointer; font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
.add-btn:hover { background: var(--color-background-secondary); }

.set-block { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; margin-bottom: 8px; }
.set-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.set-header input { flex: 1; margin-right: 8px; }
.set-tier { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.set-tier input[type=number] { width: 50px; font-size: 12px; }
.set-tier .tier-desc { flex: 1; font-size: 12px; }

.save-btn { margin-top: 14px; padding: 9px 20px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); cursor: pointer; font-size: 13px; font-weight: 500; }
.save-btn:hover { opacity: 0.85; }

/* WIKI */
.wiki-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.wiki-controls input { flex: 1; min-width: 140px; }
.wiki-controls select { width: 130px; }

.items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.item-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px; cursor: pointer; transition: border-color 0.15s; }
.item-card:hover { border-color: var(--color-border-primary); }
.item-card.selected { border: 1.5px solid var(--color-text-primary); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.card-name { font-weight: 500; font-size: 13px; line-height: 1.3; }
.rarity-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.r-commun { background: #D3D1C7; color: #444441; }
.r-peu.commun, .r-peu-commun { background: #9FE1CB; color: #085041; }
.r-rare { background: #B5D4F4; color: #0C447C; }
.r-épique { background: #CECBF6; color: #3C3489; }
.r-légendaire { background: #FAC775; color: #633806; }
.card-meta { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 6px; }
.card-stats { font-size: 11px; }
.stat-pill { display: inline-block; padding: 1px 6px; border-radius: 4px; background: var(--color-background-secondary); margin: 1px 2px 1px 0; }

.item-detail { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-top: 12px; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.detail-name { font-size: 18px; font-weight: 500; }
.detail-meta { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.detail-stats { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.stat-tag { padding: 4px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); font-size: 12px; }
.set-info { margin-top: 10px; }
.set-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; color: var(--color-text-secondary); }
.set-tier-row { display: flex; gap: 8px; align-items: center; margin: 3px 0; font-size: 12px; }
.set-count { background: var(--color-background-info, #E6F1FB); color: var(--color-text-info, #185FA5); border-radius: 4px; padding: 1px 7px; font-weight: 500; white-space: nowrap; }

/* THÉORYCRAFTER */
.tc-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.tc-slot { background: var(--color-background-secondary); border: 0.5px dashed var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px; }
.tc-slot-name { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
.tc-slot select { width: 100%; }
.tc-summary { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; }
.tc-total { font-size: 22px; font-weight: 500; margin: 6px 0 10px; }
.tc-stats-list { display: flex; flex-direction: column; gap: 5px; }
.tc-stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.tc-stat-val { font-weight: 500; }
.set-bonus-active { background: var(--color-background-success, #EAF3DE); color: var(--color-text-success, #3B6D11); border-radius: var(--border-radius-md); padding: 8px 10px; margin-top: 8px; font-size: 12px; }
.set-bonus-name { font-weight: 500; margin-bottom: 4px; }
.empty-state { text-align: center; color: var(--color-text-secondary); padding: 30px; font-size: 13px; }

.del-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 12px; padding: 2px 6px; border-radius: 4px; }
.del-btn:hover { background: var(--color-background-danger, #FCEBEB); color: var(--color-text-danger, #A32D2D); }

.export-row { display: flex; gap: 8px; margin-top: 12px; }
.export-row button { padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); cursor: pointer; font-size: 12px; color: var(--color-text-secondary); }
.export-row button:hover { color: var(--color-text-primary); border-color: var(--color-border-primary); }

.count-badge { background: var(--color-background-secondary); border-radius: 99px; padding: 1px 8px; font-size: 11px; color: var(--color-text-secondary); margin-left: 6px; }
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <div class="tab active" onclick="showTab('form')">+ Ajouter un item</div>
    <div class="tab" onclick="showTab('wiki')">Wiki <span class="count-badge" id="wiki-count">0</span></div>
    <div class="tab" onclick="showTab('tc')">Théorycrafter</div>
  </div>

  <!-- FORM -->
  <div class="panel active" id="tab-form">
    <div class="form-grid">
      <div class="form-group">
        <label>Nom de l'item</label>
        <input type="text" id="f-name" placeholder="Jambières du Nécromancien">
      </div>
      <div class="form-group">
        <label>Classe</label>
        <input type="text" id="f-class" list="class-list" placeholder="Guerrier, Mage...">
        <datalist id="class-list"></datalist>
      </div>
      <div class="form-group">
        <label>Catégorie / Slot</label>
        <input type="text" id="f-cat" list="cat-list" placeholder="Jambières P2, Casque P1...">
        <datalist id="cat-list"></datalist>
      </div>
      <div class="form-group">
        <label>Niveau minimum</label>
        <input type="number" id="f-level" placeholder="13" min="1">
      </div>
      <div class="form-group full">
        <label>Rareté</label>
        <div class="rarity-btns" id="rarity-btns">
          <div class="rarity-btn" data-r="commun" onclick="setRarity(this)">Commun</div>
          <div class="rarity-btn" data-r="peu commun" onclick="setRarity(this)">Peu commun</div>
          <div class="rarity-btn" data-r="rare" onclick="setRarity(this)">Rare</div>
          <div class="rarity-btn" data-r="épique" onclick="setRarity(this)">Épique</div>
          <div class="rarity-btn" data-r="légendaire" onclick="setRarity(this)">Légendaire</div>
        </div>
      </div>
      <div class="form-group full">
        <label>Description (optionnel)</label>
        <textarea id="f-desc" rows="2" placeholder="Description lore..."></textarea>
      </div>
    </div>

    <div style="margin-top:14px;">
      <label style="font-size:12px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.03em;display:block;margin-bottom:6px;">Stats</label>
      <div id="stats-container" class="stats-grid"></div>
      <button class="add-btn" onclick="addStat()">+ Ajouter une stat</button>
    </div>

    <div style="margin-top:14px;">
      <label style="font-size:12px;color:var(--color-text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:0.03em;display:block;margin-bottom:6px;">Bonus de set</label>
      <div id="set-container"></div>
      <button class="add-btn" onclick="addSet()">+ Ajouter un bonus de set</button>
    </div>

    <button class="save-btn" onclick="saveItem()" id="save-btn">Sauvegarder l'item</button>
    <button id="cancel-edit-btn" style="display:none;margin-top:8px;padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;font-size:13px;color:var(--color-text-secondary);" onclick="cancelEdit()">Annuler</button>

    <div class="export-row">
      <button onclick="exportJSON()">Exporter JSON</button>
      <button onclick="importJSON()">Importer JSON</button>
    </div>
  </div>

  <!-- WIKI -->
  <div class="panel" id="tab-wiki">
    <div class="wiki-controls">
      <input type="text" id="search" placeholder="Rechercher..." oninput="renderWiki()">
      <select onchange="filterClass(this.value)">
        <option value="">Toutes les classes</option>
      </select>
      <select onchange="filterCat(this.value)">
        <option value="">Toutes catégories</option>
      </select>
      <select onchange="filterRarity(this.value)">
        <option value="">Toutes raretés</option>
        <option>commun</option>
        <option>peu commun</option>
        <option>rare</option>
        <option>épique</option>
        <option>légendaire</option>
      </select>
    </div>
    <div id="items-grid" class="items-grid"></div>
    <div id="item-detail-panel"></div>
  </div>

  <!-- THÉORYCRAFTER -->
  <div class="panel" id="tab-tc">
    <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;">
      <div style="flex:1;min-width:260px;">
        <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em;">Équipement</div>
        <div id="tc-slots" class="tc-layout"></div>
        <button class="add-btn" style="margin-top:8px;width:100%;" onclick="addTCSlot()">+ Ajouter un slot</button>
      </div>
      <div style="flex:1;min-width:220px;">
        <div class="tc-summary">
          <div style="font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;">Résumé du stuff</div>
          <div id="tc-stats-list" class="tc-stats-list"></div>
          <div id="tc-sets"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let items = JSON.parse(localStorage.getItem('mc_items') || '[]');
let selectedRarity = '';
let editingId = null;
let filterClassVal = '';
let filterCatVal = '';
let filterRarityVal = '';
let selectedItem = null;
let tcSlots = ['Casque','Plastron','Jambières','Bottes','Anneau 1','Anneau 2'];

function save() { localStorage.setItem('mc_items', JSON.stringify(items)); }

function showTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['form','wiki','tc'][i]===t));
  document.querySelectorAll('.panel').forEach((el,i) => el.classList.toggle('active', ['tab-form','tab-wiki','tab-tc'][i]==='tab-'+t));
  if(t==='wiki') renderWiki();
  if(t==='tc') renderTC();
}

function setRarity(btn) {
  document.querySelectorAll('.rarity-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRarity = btn.dataset.r;
}

function addStat(name='', val='') {
  const c = document.getElementById('stats-container');
  const d = document.createElement('div');
  d.className = 'stat-row';
  d.innerHTML = `<input type="text" placeholder="Défense, Santé..." value="${name}" list="stat-names" style="flex:1;">
    <input type="number" placeholder="+0" value="${val}" step="0.01" style="width:70px;font-size:12px;">
    <button class="rm" onclick="this.parentElement.remove()">×</button>`;
  c.appendChild(d);
}

function addSet(name='', tiers=[]) {
  const c = document.getElementById('set-container');
  const id = 'set_'+Date.now()+'_'+Math.random();
  const d = document.createElement('div');
  d.className = 'set-block';
  d.id = id;
  d.innerHTML = `<div class="set-header">
    <input type="text" placeholder="Nom du set (ex: Nécromancien Guerrier)" value="${name}" style="flex:1;margin-right:8px;">
    <button class="rm" onclick="document.getElementById('${id}').remove()">× Supprimer</button>
  </div>
  <div class="set-tiers"></div>
  <button class="add-btn" onclick="addSetTier('${id}')">+ Ajouter un palier</button>`;
  c.appendChild(d);
  tiers.forEach(t => addSetTier(id, t.count, t.bonus));
  if(!tiers.length) addSetTier(id);
}

function addSetTier(setId, count='', bonus='') {
  const container = document.querySelector('#'+setId+' .set-tiers');
  const d = document.createElement('div');
  d.className = 'set-tier';
  d.innerHTML = `<span style="font-size:11px;color:var(--color-text-secondary);">Pièces:</span>
    <input type="number" min="1" value="${count}" placeholder="2" style="width:50px;font-size:12px;">
    <input type="text" placeholder="Bonus (ex: +6 stamina max)" value="${bonus}" class="tier-desc" style="font-size:12px;">
    <button class="rm" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(d);
}

function getFormData() {
  const stats = [];
  document.querySelectorAll('#stats-container .stat-row').forEach(r => {
    const inputs = r.querySelectorAll('input');
    if(inputs[0].value.trim()) stats.push({name: inputs[0].value.trim(), value: parseFloat(inputs[1].value)||0});
  });
  const sets = [];
  document.querySelectorAll('#set-container .set-block').forEach(sb => {
    const name = sb.querySelector('input[type=text]').value.trim();
    const tiers = [];
    sb.querySelectorAll('.set-tier').forEach(t => {
      const ins = t.querySelectorAll('input');
      if(ins[1].value.trim()) tiers.push({count: parseInt(ins[0].value)||2, bonus: ins[1].value.trim()});
    });
    if(name) sets.push({name, tiers});
  });
  return {
    id: editingId || Date.now(),
    name: document.getElementById('f-name').value.trim(),
    class: document.getElementById('f-class').value.trim(),
    category: document.getElementById('f-cat').value.trim(),
    level: parseInt(document.getElementById('f-level').value)||0,
    rarity: selectedRarity,
    description: document.getElementById('f-desc').value.trim(),
    stats, sets
  };
}

function saveItem() {
  const item = getFormData();
  if(!item.name) { alert('Donne un nom à l\'item !'); return; }
  if(editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    if(idx !== -1) items[idx] = item;
    editingId = null;
  } else {
    items.push(item);
  }
  save();
  resetForm();
  updateAutocomplete();
  document.getElementById('wiki-count').textContent = items.length;
}

function resetForm() {
  ['f-name','f-class','f-cat','f-desc'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-level').value='';
  document.querySelectorAll('.rarity-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('stats-container').innerHTML='';
  document.getElementById('set-container').innerHTML='';
  selectedRarity = '';
  editingId = null;
  document.getElementById('save-btn').textContent = 'Sauvegarder l\'item';
  document.getElementById('cancel-edit-btn').style.display='none';
}

function cancelEdit() { resetForm(); }

function updateAutocomplete() {
  const classes = [...new Set(items.map(i=>i.class).filter(Boolean))];
  const cats = [...new Set(items.map(i=>i.category).filter(Boolean))];
  document.getElementById('class-list').innerHTML = classes.map(c=>`<option value="${c}">`).join('');
  document.getElementById('cat-list').innerHTML = cats.map(c=>`<option value="${c}">`).join('');

  const clSel = document.querySelectorAll('.wiki-controls select')[0];
  const catSel = document.querySelectorAll('.wiki-controls select')[1];
  const curCl = clSel.value, curCat = catSel.value;
  clSel.innerHTML = '<option value="">Toutes les classes</option>' + classes.map(c=>`<option${c===curCl?' selected':''}>${c}</option>`).join('');
  catSel.innerHTML = '<option value="">Toutes catégories</option>' + cats.map(c=>`<option${c===curCat?' selected':''}>${c}</option>`).join('');
}

function rarityClass(r) { return 'r-'+(r||'commun').replace(/\s+/g,'-'); }

function renderCard(item) {
  const stats = (item.stats||[]).slice(0,3).map(s=>`<span class="stat-pill">${s.name} ${s.value>0?'+':''}${s.value}</span>`).join('');
  const sel = selectedItem===item.id;
  return `<div class="item-card${sel?' selected':''}" onclick="selectItem(${item.id})">
    <div class="card-top">
      <div class="card-name">${item.name}</div>
      <span class="rarity-badge ${rarityClass(item.rarity)}">${item.rarity||'—'}</span>
    </div>
    <div class="card-meta">${[item.class,item.category,item.level?'Niv. '+item.level:''].filter(Boolean).join(' · ')}</div>
    <div class="card-stats">${stats}</div>
  </div>`;
}

function renderDetail(item) {
  const stats = (item.stats||[]).map(s=>`<div class="stat-tag">${s.name} <strong>${s.value>0?'+':''}${s.value}</strong></div>`).join('');
  const sets = (item.sets||[]).map(s=>`
    <div class="set-info">
      <div class="set-title">${s.name}</div>
      ${(s.tiers||[]).map(t=>`<div class="set-tier-row"><span class="set-count">${t.count} pièces</span><span>${t.bonus}</span></div>`).join('')}
    </div>`).join('');
  return `<div class="item-detail">
    <div class="detail-header">
      <div><div class="detail-name">${item.name}</div>
      <div class="detail-meta">${[item.class,item.category,item.level?'Niv. min. '+item.level:''].filter(Boolean).join(' · ')}</div></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <span class="rarity-badge ${rarityClass(item.rarity)}">${item.rarity||'—'}</span>
        <button class="del-btn" onclick="editItem(${item.id})">✏ Éditer</button>
        <button class="del-btn" onclick="deleteItem(${item.id})">Supprimer</button>
      </div>
    </div>
    ${item.description?`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;font-style:italic;">${item.description}</div>`:''}
    <div class="detail-stats">${stats}</div>
    ${sets}
  </div>`;
}

function selectItem(id) {
  selectedItem = selectedItem===id ? null : id;
  renderWiki();
}

function renderWiki() {
  updateAutocomplete();
  const q = (document.getElementById('search').value||'').toLowerCase();
  let filtered = items.filter(i => {
    const matchQ = !q || i.name.toLowerCase().includes(q) || (i.class||'').toLowerCase().includes(q) || (i.category||'').toLowerCase().includes(q);
    const matchCl = !filterClassVal || i.class===filterClassVal;
    const matchCat = !filterCatVal || i.category===filterCatVal;
    const matchR = !filterRarityVal || i.rarity===filterRarityVal;
    return matchQ && matchCl && matchCat && matchR;
  });
  document.getElementById('wiki-count').textContent = items.length;
  const grid = document.getElementById('items-grid');
  if(!filtered.length) { grid.innerHTML='<div class="empty-state">Aucun item trouvé. Commence par en ajouter dans "Ajouter un item".</div>'; }
  else { grid.innerHTML = filtered.map(renderCard).join(''); }
  const detail = document.getElementById('item-detail-panel');
  const sel = items.find(i=>i.id===selectedItem);
  detail.innerHTML = sel ? renderDetail(sel) : '';
}

function filterClass(v) { filterClassVal=v; renderWiki(); }
function filterCat(v) { filterCatVal=v; renderWiki(); }
function filterRarity(v) { filterRarityVal=v; renderWiki(); }

function editItem(id) {
  const item = items.find(i=>i.id===id);
  if(!item) return;
  showTab('form');
  editingId = id;
  document.getElementById('f-name').value = item.name||'';
  document.getElementById('f-class').value = item.class||'';
  document.getElementById('f-cat').value = item.category||'';
  document.getElementById('f-level').value = item.level||'';
  document.getElementById('f-desc').value = item.description||'';
  selectedRarity = item.rarity||'';
  document.querySelectorAll('.rarity-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.r===selectedRarity);
  });
  document.getElementById('stats-container').innerHTML='';
  (item.stats||[]).forEach(s=>addStat(s.name,s.value));
  document.getElementById('set-container').innerHTML='';
  (item.sets||[]).forEach(s=>addSet(s.name,s.tiers));
  document.getElementById('save-btn').textContent='Mettre à jour l\'item';
  document.getElementById('cancel-edit-btn').style.display='inline-block';
  window.scrollTo(0,0);
}

function deleteItem(id) {
  if(!confirm('Supprimer cet item ?')) return;
  items = items.filter(i=>i.id!==id);
  save();
  selectedItem=null;
  renderWiki();
}

function renderTC() {
  const c = document.getElementById('tc-slots');
  c.innerHTML = tcSlots.map((slot,i)=>`
    <div class="tc-slot">
      <div class="tc-slot-name">${slot}</div>
      <select onchange="calcTC()" id="tc-slot-${i}">
        <option value="">— Aucun —</option>
        ${items.map(item=>`<option value="${item.id}">${item.name}</option>`).join('')}
      </select>
    </div>`).join('');
  calcTC();
}

function addTCSlot() {
  const name = prompt('Nom du slot (ex: Arme, Collier...)');
  if(name) { tcSlots.push(name); renderTC(); }
}

function calcTC() {
  const totals = {};
  const setCount = {};
  const equippedSets = {};
  tcSlots.forEach((_,i)=>{
    const sel = document.getElementById('tc-slot-'+i);
    if(!sel) return;
    const id = parseInt(sel.value);
    if(!id) return;
    const item = items.find(it=>it.id===id);
    if(!item) return;
    (item.stats||[]).forEach(s=>{ totals[s.name]=(totals[s.name]||0)+s.value; });
    (item.sets||[]).forEach(s=>{
      setCount[s.name]=(setCount[s.name]||0)+1;
      equippedSets[s.name]=s;
    });
  });

  const list = document.getElementById('tc-stats-list');
  if(!Object.keys(totals).length) { list.innerHTML='<div class="empty-state">Sélectionne des items pour voir les stats cumulées.</div>'; }
  else {
    list.innerHTML = Object.entries(totals).map(([k,v])=>
      `<div class="tc-stat-row"><span>${k}</span><span class="tc-stat-val">${v>0?'+':''}${Math.round(v*100)/100}</span></div>`).join('');
  }

  const setsEl = document.getElementById('tc-sets');
  let setsHtml = '';
  Object.entries(setCount).forEach(([name,cnt])=>{
    const setDef = equippedSets[name];
    if(!setDef) return;
    const active = (setDef.tiers||[]).filter(t=>cnt>=t.count);
    if(active.length) {
      setsHtml += `<div class="set-bonus-active"><div class="set-bonus-name">${name} (${cnt} pièces)</div>${active.map(t=>`<div>✓ ${t.bonus}</div>`).join('')}</div>`;
    }
  });
  setsEl.innerHTML = setsHtml || (Object.keys(setCount).length?'<div style="font-size:12px;color:var(--color-text-secondary);margin-top:8px;">Pas assez de pièces pour activer les bonus de set.</div>':'');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='mc_items.json'; a.click();
}

function importJSON() {
  const input = document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(Array.isArray(data)) { items = data; save(); updateAutocomplete(); document.getElementById('wiki-count').textContent=items.length; alert('Importé ! '+data.length+' items chargés.'); }
      } catch(e) { alert('Fichier JSON invalide.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

updateAutocomplete();
document.getElementById('wiki-count').textContent = items.length;
</script>
</body>
